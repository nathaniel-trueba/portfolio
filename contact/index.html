<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <h1>Contact</h1>
    <form action="mailto:ntrueba@ucsd.edu" method="post" enctype="text/plain">
        <label>
            Email:
            <input name="email" type="email" value="example@domain.com">
        </label>
        <label>
            Subject:
            <input name="subject" value="Placeholder Subject">
        </label>
        <label>
            Message:
            <textarea name="body">This is a test message.</textarea>
        </label>
        <button>Submit</button>
    </form>
    <script type="module" src="./global.js"></script>
</body>
</html>
