<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <h1>Contact</h1>
    
    <form action="mailto:ntrueba@ucsd.edu" method="post" enctype="text/plain">
        <label>
            Subject:
            <input 
                name="subject" 
                type="text"
                placeholder="Enter a subject">
        </label>

        <label>
            Message:
            <textarea
            name="body"
            type="text"
            placeholder="Enter your message here."></textarea>
        </label>

        <button type="submit">Send</button>
    </form>

    <script type="module" src="../global.js"></script>
</body>
</html>
